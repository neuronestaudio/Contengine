name: Publish scheduled posts

# Manual trigger for /api/cron/publish, which publishes any post that is
# approved and due. Use it to force a publish run from the Actions tab, or to
# check the endpoint and CRON_SECRET still work.
#
# The recurring schedule is run by cron-job.org (chosen for punctuality), NOT
# here — it demonstrably auto-published a real scheduled post on 2026-07-16.
# Do NOT add a `schedule:` trigger while cron-job.org is active: two schedulers
# can both read the same due post before either flips it to 'publishing' and
# double-post to Meta. If you ever switch away from cron-job.org, re-add:
#   schedule:
#     - cron: "*/5 * * * *"
on:
  workflow_dispatch:

# Never let two publish runs overlap: both would see the same due posts before
# either flipped them to 'publishing', and could double-post to Meta.
concurrency:
  group: publish-scheduled-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger publisher
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL || 'https://contengine-black.vercel.app' }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET repository secret is not set — the endpoint will 401."
            exit 1
          fi

          # ?wait=1 blocks until publishing finishes and returns per-post
          # results, so a failed publish can be surfaced below. The recurring
          # scheduler deliberately omits it and gets an immediate ack instead;
          # this runner has no such timeout pressure. A carousel to both
          # platforms takes ~90s and the route publishes up to 2 per run, so
          # allow generous headroom.
          code=$(curl -sS -o response.json -w '%{http_code}' \
            --max-time 420 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/publish?wait=1")

          echo "HTTP ${code}"
          cat response.json
          echo

          if [ "${code}" = "401" ]; then
            echo "::error::401 Unauthorized — the CRON_SECRET secret does not match the app's CRON_SECRET env var in Vercel."
            exit 1
          fi

          if [ "${code}" != "200" ]; then
            echo "::error::Publisher returned HTTP ${code}"
            exit 1
          fi

          if [ "$(jq -r '.ok' response.json)" != "true" ]; then
            echo "::error::Publisher reported failure: $(jq -rc '.error // .' response.json)"
            exit 1
          fi

          processed=$(jq -r '.processed' response.json)
          echo "Processed ${processed} post(s)."

          # A 200 only means the batch ran — individual posts can still fail to
          # reach Meta (expired Page token, etc). Surface those loudly instead
          # of letting a green check hide them.
          failures=$(jq -r '[.results[]? | select(.status != "published")] | length' response.json)
          if [ "${failures}" != "0" ]; then
            jq -r '.results[]? | select(.status != "published")
                   | "::error::Post \(.post_id) → \(.status): \(.error // "unknown error")"' response.json
            exit 1
          fi

          if [ "${processed}" != "0" ]; then
            jq -r '.results[]? | "Published \(.post_id)"' response.json
          fi
